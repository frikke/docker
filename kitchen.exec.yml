---
driver:
  name: exec
  sudo: true
  chef_omnibus_install: false

transport:
  name: exec

provisioner:
  name: chef_infra
  product_name: <%= ENV['CHEF_PRODUCT_NAME'] || 'cinc' %>
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  install_strategy: skip
  chef_client_path: /opt/cinc-workstation/bin/chef-client

verifier:
  name: inspec

platforms:
  - name: ubuntu-latest

suites:
  - name: default
    run_list:
      - recipe[test::default]

  - name: installation_script
    run_list:
      - recipe[test::installation_script]

  - name: installation_package
    run_list:
      - recipe[test::installation_package]

  - name: installation_tarball
    run_list:
      - recipe[test::installation_tarball]

  - name: install_and_stop
    run_list:
      - recipe[test::install_and_stop]

  - name: resources
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::image]
      - recipe[test::container]
      - recipe[test::exec]
      - recipe[test::plugin]
      - recipe[test::image_prune]
      - recipe[test::volume_prune]

  - name: network
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::network]

  - name: volume
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::volume]
      - recipe[test::volume_prune]

  - name: registry
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::registry]

  - name: swarm
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    attributes:
      docker:
        swarm:
          init:
            advertise_addr: '127.0.0.1'
            listen_addr: '0.0.0.0:2377'
          rotate_token: true
          service:
            name: 'web'
            image: 'nginx:latest'
            publish: ['80:80']
            replicas: 2
    run_list:
      - recipe[test::swarm]
      - recipe[test::swarm_service]

  - name: smoke
    run_list:
      - recipe[test::smoke]
