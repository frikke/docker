---
driver:
  name: vagrant
  customize:
    memory: 2048
    cpus: 2

provisioner:
  name: chef_infra
  product_name: <%= ENV['CHEF_PRODUCT_NAME'] || 'chef' %>
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]

  - name: installation_script
    excludes:
      - 'almalinux-9'
      - 'almalinux-10'
      - 'amazonlinux-2023'
      - 'oraclelinux-8'
      - 'oraclelinux-9'
      - 'rockylinux-9'
      - 'rockylinux-10'
    run_list:
      - recipe[test::installation_script]

  - name: installation_package
    run_list:
      - recipe[test::installation_package]
    excludes:
      - 'amazonlinux-2'

  - name: installation_tarball
    run_list:
      - recipe[test::installation_tarball]

  - name: install_and_stop
    run_list:
      - recipe[test::install_and_stop]

  ##################
  # resource testing
  ##################
  - name: resources
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::image]
      - recipe[test::container]
      - recipe[test::exec]
      - recipe[test::plugin]
      - recipe[test::image_prune]
      - recipe[test::volume_prune]

  - name: network
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::network]

  - name: volume
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::volume]
      - recipe[test::volume_prune]

  - name: registry
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    run_list:
      - recipe[test::default]
      - recipe[test::registry]

  ####################
  # swarm testing
  ####################

  - name: swarm_manager
    driver:
      network:
        - ["private_network", {ip: "192.168.56.10"}]
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    attributes:
      docker:
        swarm:
          init:
            advertise_addr: '192.168.56.10'
            listen_addr: '0.0.0.0:2377'
          rotate_token: true
          service:
            name: 'web'
            image: 'nginx:latest'
            publish: ['80:80']
            replicas: 2
    run_list:
      - recipe[test::swarm]
      - recipe[test::swarm_service]

  - name: swarm_worker
    driver:
      network:
        - ["private_network", {ip: "192.168.56.11"}]
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    attributes:
      docker:
        swarm:
          join:
            manager_ip: '192.168.56.10:2377'
            advertise_addr: '192.168.56.11'
            listen_addr: '0.0.0.0:2377'
            # Token will be obtained from the manager node
    run_list:
      - recipe[test::swarm_worker]

  #############################
  # quick service smoke testing
  #############################

  - name: smoke
    run_list:
      - recipe[test::smoke]

  ###############################
  # docker_swarm resources
  ###############################
  - name: swarm
    includes:
      - ubuntu-22.04
    provisioner:
      enforce_idempotency: false
      multiple_converge: 1
    attributes:
      docker:
        swarm:
          init:
            advertise_addr: '127.0.0.1'
            listen_addr: '0.0.0.0:2377'
          rotate_token: true
          service:
            name: 'web'
            image: 'nginx:latest'
            publish: ['80:80']
            replicas: 2
    run_list:
      - recipe[test::swarm]
      - recipe[test::swarm_service]
